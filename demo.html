<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bsts Demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="main" class="container my-4"></div>

    <script type="importmap">
        {
            "imports": {
                "bootstrap": "https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.esm.js",
                "@popperjs/core": "https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/esm/popper.js"
            }
        }
    </script>

    <script type="module">
        import { core, b, h } from "./build/esm/index.js";

        core.documentReady(() => {
            const body = document.getElementById("main");
            if (!body) return;

            core.replaceChild(
            body,
            new h.div([
                new h.p("This is example p tag"),
                new h.p(
                { lead: true, data: { test: "test-data" } },
                "This is example p tag with attribute"
                ),
                new b.button({ id: "btn1", color: "primary" }, "Button"),
            ])
            );
        });
    </script>
  </body>
</html>
