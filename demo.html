<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bsts Demo</title>
    <link
      href="./node_modules/bootstrap/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="main" class="container my-4"></div>

    <script type="importmap">
        {
            "imports": {
                "bootstrap": "./node_modules/bootstrap/dist/js/bootstrap.esm.js",
                "@popperjs/core": "./node_modules/@popperjs/core/dist/esm/popper.js"
            }
        }
    </script>

    <script type="module">
        import { core, b, h } from "./build/esm/index.js";

        core.documentReady(() => {
            const body = document.getElementById("main");
            if (!body) return;

            core.replaceChild(
            body,
            new h.div({ row: true, style:{maxWidth:"50rem",gap:"1rem"} }, [
                new h.p("This is example p tag"),
                new h.p(
                { lead: true, data: { test: "test-data" } },
                "This is example p tag with attribute"
                ),
                new b.button({ id: "btn1", color: "primary" }, "Button"),
                new h.code({}, "() => console.log('Hello World')"),
                new b.card.container({ style: { width: "18rem" } }, [
                    new b.card.img({
                        location: "top",
                        src: "https://picsum.photos/seed/bsts_0/286/180.webp",
                        alt: "Image cap",
                    }),
                    new b.card.body([
                        new b.card.title("Card title"),
                        new b.card.text("Some quick example text to build on the card title and make up the bulk of the card's content."),
                        new b.button("Go somewhere"),
                    ]),
                ])
            ])
            );
        });
    </script>
  </body>
</html>
