name: Publish package

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:
        inputs:
            publish:
                description: "Publish to npm when manually triggered"
                required: false
                default: "false"
                type: boolean

permissions:
    contents: read
    id-token: write

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "26"
                  cache: "pnpm"

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.32.1

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build package
              run: pnpm run build

    publish:
        name: Publish
        needs: build
        runs-on: ubuntu-latest
        if: |
            github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') ||
            github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true'
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "26"
                  registry-url: "https://registry.npmjs.org"
                  cache: "pnpm"

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.32.1

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build package
              run: pnpm run build

            - name: Publish to npm using OIDC
              run: pnpm publish --access public --no-git-checks
